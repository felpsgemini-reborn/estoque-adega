<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque Adega - Nuvem</title>
    <!-- Tailwind CSS para o visual -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Biblioteca oficial do Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 p-4 md:p-8 font-sans">

    <div class="max-w-5xl mx-auto bg-white p-6 rounded-lg shadow-lg">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-slate-800">🍷 Controle de Estoque - Adega</h1>
            <!-- Atualizei o status para indicar que agora roda na nuvem -->
            <span class="bg-blue-100 text-blue-800 text-sm font-semibold px-3 py-1 rounded">Status: Online (Nuvem)</span>
        </div>
        
        <!-- Formulário de Cadastro -->
        <div class="bg-slate-50 p-4 rounded-md border border-slate-200 mb-8">
            <h2 class="text-lg font-semibold text-slate-700 mb-4">Cadastrar Nova Bebida</h2>
            <form id="formProduto" class="grid grid-cols-1 md:grid-cols-6 gap-3">
                <input type="text" id="nome" placeholder="Nome (ex: Vinho Casillero)" required class="border border-slate-300 p-2 rounded md:col-span-2 focus:outline-none focus:border-blue-500">
                
                <select id="categoria" class="border border-slate-300 p-2 rounded focus:outline-none focus:border-blue-500">
                    <option value="Vinho">Vinho</option>
                    <option value="Cerveja">Cerveja</option>
                    <option value="Vodka">Vodka</option>
                    <option value="Licor">Licor</option>
                    <option value="Whisky">Whisky</option>
                    <option value="Energético">Energético</option>
                    <option value="Outros">Outros</option>
                </select>

                <input type="text" id="volume" placeholder="Vol (ex: 750ml)" required class="border border-slate-300 p-2 rounded focus:outline-none focus:border-blue-500">
                
                <input type="number" id="quantidade" placeholder="Qtd Inicial" required min="0" class="border border-slate-300 p-2 rounded focus:outline-none focus:border-blue-500">
                
                <button type="submit" class="bg-blue-600 text-white font-semibold p-2 rounded hover:bg-blue-700 transition">Adicionar</button>
            </form>
        </div>

        <!-- Tabela de Estoque -->
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-800 text-white">
                        <th class="p-3 rounded-tl-md">Nome da Bebida</th>
                        <th class="p-3">Categoria</th>
                        <th class="p-3">Volume</th>
                        <th class="p-3 text-center">Quantidade</th>
                        <th class="p-3 text-center rounded-tr-md">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaEstoque" class="text-slate-700">
                    <!-- Os itens serão injetados aqui pelo JavaScript -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Lógica do Sistema na Nuvem -->
    <script>
        // 1. Configuração do Supabase (Chaves Inseridas)
        const supabaseUrl = 'https://nkbvqzkshyoxerdfdwlg.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5rYnZxemtzaHlveGVyZGZkd2xnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyMzEzMTksImV4cCI6MjA5ODgwNzMxOX0.EEX1lNaHxV2P7On2VrY68hpR2fyxRgjtr7mMKnpYPO0';
        
        // Criando o cliente para conversar com o banco
        const db = supabase.createClient(supabaseUrl, supabaseKey);

        const form = document.getElementById('formProduto');
        const tabela = document.getElementById('tabelaEstoque');

        // 2. Buscar os dados da nuvem
        async function carregarEstoque() {
            tabela.innerHTML = '<tr><td colspan="5" class="p-4 text-center text-blue-500 font-semibold">Sincronizando com a nuvem...</td></tr>';
            
            const { data: estoque, error } = await db
                .from('estoque')
                .select('*')
                .order('id', { ascending: true });

            if (error) {
                console.error("Erro do Supabase:", error);
                tabela.innerHTML = '<tr><td colspan="5" class="p-4 text-center text-red-500">Erro de conexão. A tabela "estoque" foi criada no painel do Supabase?</td></tr>';
                return;
            }

            tabela.innerHTML = ''; 

            if (estoque.length === 0) {
                tabela.innerHTML = '<tr><td colspan="5" class="p-4 text-center text-slate-500">Nenhuma bebida cadastrada. Adicione o primeiro item!</td></tr>';
                return;
            }

            estoque.forEach((produto) => {
                const alertaEstoqueBaixo = produto.quantidade < 5 ? 'text-red-600 font-bold' : 'text-slate-800 font-medium';
                const tr = document.createElement('tr');
                tr.className = "border-b border-slate-200 hover:bg-slate-50";
                
                tr.innerHTML = `
                    <td class="p-3">${produto.nome}</td>
                    <td class="p-3"><span class="bg-slate-200 px-2 py-1 rounded text-xs font-semibold">${produto.categoria}</span></td>
                    <td class="p-3 text-slate-500">${produto.volume}</td>
                    <td class="p-3 text-center ${alertaEstoqueBaixo}">${produto.quantidade} un.</td>
                    <td class="p-3 text-center">
                        <button onclick="alterarQuantidade(${produto.id}, ${produto.quantidade}, 1)" class="bg-green-500 text-white px-3 py-1 rounded hover:bg-green-600 text-sm font-bold mr-1">+</button>
                        <button onclick="alterarQuantidade(${produto.id}, ${produto.quantidade}, -1)" class="bg-yellow-500 text-white px-3 py-1 rounded hover:bg-yellow-600 text-sm font-bold mr-1">-</button>
                        <button onclick="deletarProduto(${produto.id})" class="bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600 text-sm ml-2">Excluir</button>
                    </td>
                `;
                tabela.appendChild(tr);
            });
        }

        // 3. Salvar novo produto na nuvem
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            const btnSubmit = form.querySelector('button[type="submit"]');
            btnSubmit.innerText = "Enviando...";
            btnSubmit.disabled = true;

            const novoProduto = {
                nome: document.getElementById('nome').value,
                categoria: document.getElementById('categoria').value,
                volume: document.getElementById('volume').value,
                quantidade: parseInt(document.getElementById('quantidade').value)
            };

            const { error } = await db.from('estoque').insert([novoProduto]);

            if (!error) {
                form.reset();
                await carregarEstoque();
            } else {
                alert("Erro ao salvar. Verifique se as colunas no Supabase estão corretas.");
                console.error(error);
            }

            btnSubmit.innerText = "Adicionar";
            btnSubmit.disabled = false;
        });

        // 4. Alterar a quantidade (Venda ou Reposição)
        async function alterarQuantidade(id, quantidadeAtual, valor) {
            const novaQuantidade = quantidadeAtual + valor;
            if (novaQuantidade >= 0) {
                await db
                    .from('estoque')
                    .update({ quantidade: novaQuantidade })
                    .eq('id', id);
                    
                carregarEstoque(); 
            }
        }

        // 5. Excluir uma bebida permanentemente
        async function deletarProduto(id) {
            if (confirm("Tem certeza que deseja remover esta bebida do sistema?")) {
                await db
                    .from('estoque')
                    .delete()
                    .eq('id', id);
                    
                carregarEstoque(); 
            }
        }

        // Dá o pontapé inicial carregando a tabela
        carregarEstoque();
    </script>
</body>
</html>
